{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h5 class="mb-0">人员数据分析</h5>
    <small class="text-muted">可视化分析人员结构、班组战力、经验分布等关键指标</small>
  </div>
  <div class="btn-group">
    <a href="{{ url_for('personnel.dashboard') }}" class="btn btn-outline-secondary btn-sm">返回工作台</a>
    <a href="{{ url_for('personnel.index') }}" class="btn btn-secondary btn-sm">人员管理</a>
  </div>
</div>

<!-- KPI 卡片 -->
<div class="row g-4 mb-4">
  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h6 class="card-subtitle mb-2 text-muted">在册总人数</h6>
        <p class="card-text fs-1 fw-bold" id="kpi-total-count">0</p>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h6 class="card-subtitle mb-2 text-muted">电客车司机</h6>
        <p class="card-text fs-1 fw-bold text-primary" id="kpi-driver-count">0</p>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h6 class="card-subtitle mb-2 text-muted">新手司机数</h6>
        <p class="card-text fs-1 fw-bold text-warning" id="kpi-rookie-count">0</p>
        <small class="text-muted">(单驾 < 1年)</small>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h6 class="card-subtitle mb-2 text-muted">党员占比</h6>
        <p class="card-text fs-1 fw-bold text-danger" id="kpi-party-rate">0%</p>
      </div>
    </div>
  </div>
</div>

<!-- 图表区域 -->
<!-- 第一行：安全风险等级分布图 + 班组战力雷达图 -->
<div class="row g-4 mb-4">
  <div class="col-xl-6 col-lg-12">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div id="riskDistributionChart" style="width: 100%; min-height: 400px; height: 50vh; max-height: 600px;"></div>
      </div>
    </div>
  </div>
  <div class="col-xl-6 col-lg-12">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div id="teamPowerChart" style="width: 100%; min-height: 400px; height: 50vh; max-height: 600px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- 第二行：经验溢出分析图 + 职业稳定性分析 -->
<div class="row g-4 mb-4">
  <div class="col-xl-6 col-lg-12">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div id="experienceScatterChart" style="width: 100%; min-height: 400px; height: 50vh; max-height: 600px;"></div>
      </div>
    </div>
  </div>
  <div class="col-xl-6 col-lg-12">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div id="stabilityScatterChart" style="width: 100%; min-height: 400px; height: 50vh; max-height: 600px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- 第三行：排班压力预警图 -->
<div class="row g-4 mb-4">
  <div class="col-xl-8 col-lg-12">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <div id="scheduleWarningChart" style="width: 100%; min-height: 400px; height: 50vh; max-height: 600px;"></div>
      </div>
    </div>
  </div>
  <div class="col-xl-4 col-lg-12">
    <div class="card shadow-sm h-100">
      <div class="card-body">
        <h6 class="card-title text-center mb-3">政治面貌分布</h6>
        <div id="politicalStatusChart" style="width: 100%; min-height: 350px; height: 45vh; max-height: 500px;"></div>
      </div>
    </div>
  </div>
</div>

<!-- 引入 ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="{{ url_for('static', filename='js/echarts-theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/chart-registry.js') }}"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Registry chart ID → 页面 DOM 容器 ID 映射
    const chartIdToDOM = {
      risk_distribution: 'riskDistributionChart',
      team_power: 'teamPowerChart',
      experience_scatter: 'experienceScatterChart',
      stability_scatter: 'stabilityScatterChart',
      hometown_stats: 'scheduleWarningChart',
      political_stats: 'politicalStatusChart'
    };

    // 初始化所有图表容器
    const chartInstances = {};
    Object.entries(chartIdToDOM).forEach(function ([id, domId]) {
      const el = document.getElementById(domId);
      if (el) chartInstances[id] = echarts.init(el);
    });

    function fetchAndRenderCharts() {
      const apiUrl = `{{ url_for('personnel.api_analytics_data') }}`;

      Object.values(chartInstances).forEach(function (c) { c.showLoading(); });

      fetch(apiUrl)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          Object.values(chartInstances).forEach(function (c) { c.hideLoading(); });

          // KPI 更新（不进 registry）
          updateKpis(data);

          // 使用 ChartRegistry 渲染所有图表
          var charts = ChartRegistry.getCharts('analytics');
          charts.forEach(function (chartDef) {
            if (!chartInstances[chartDef.id]) return;
            ChartRegistry.renderToContainer('analytics', chartDef.id, data, chartInstances[chartDef.id]);
          });
        })
        .catch(function (error) {
          Object.values(chartInstances).forEach(function (c) {
            try { c.hideLoading(); } catch (e) { }
          });
          console.error('Error fetching analytics data:', error);
        });
    }

    function updateKpis(data) {
      document.getElementById('kpi-total-count').textContent = data.total_count || 0;
      document.getElementById('kpi-driver-count').textContent = data.driver_count || 0;

      var rookieCount = (data.risk_distribution || {})['新手(<1年)'] || 0;
      document.getElementById('kpi-rookie-count').textContent = rookieCount;

      var totalCount = data.total_count || 1;
      var partyMembers = ((data.political_stats || {})['中共党员'] || 0) + ((data.political_stats || {})['中共预备党员'] || 0);
      var partyRate = ((partyMembers / totalCount) * 100).toFixed(1);
      document.getElementById('kpi-party-rate').textContent = partyRate + '%';
    }

    // 页面加载时执行
    fetchAndRenderCharts();

    // 监听窗口大小变化，重绘图表
    window.addEventListener('resize', function () {
      Object.values(chartInstances).forEach(function (c) { c.resize(); });
    });
  });
</script>

{% endblock %}
