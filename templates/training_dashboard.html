{% extends "base.html" %}

{% block content %}


<div class="page-header-card mb-4 animate-fade-in-up">
  <div class="card-body">
    <div class="row align-items-center">
      <div class="col-lg-8">
        <div class="d-flex align-items-center mb-3">
          <div class="feature-icon bg-primary bg-opacity-10 rounded-circle p-3 me-3">
            <i class="fas fa-graduation-cap fa-2x text-primary"></i>
          </div>
          <div>
            <h1 class="mb-1 fw-bold">培训工作台</h1>
            <p class="text-muted mb-0">集中访问当前所有培训相关功能，快速切换各类工具</p>
          </div>
        </div>
      </div>
      <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
        <a href="{{ url_for('training.records') }}" class="btn btn-primary">
          <i class="fas fa-list me-2"></i>直接查看培训记录
        </a>
      </div>
    </div>
  </div>
</div>

<div class="dashboard-grid mb-4">
  {% for card in feature_cards %}
  <div class="animate-fade-in-up feature-card" data-delay="{{ loop.index * 0.1 }}">
    <div class="feature-card-new">
      <div class="card-body">
        <div class="icon-box bg-primary bg-opacity-10 text-primary">
          <i class="{{ card.icon }}"></i>
        </div>
        <h5 class="card-title">{{ card.title }}</h5>
        <p class="card-desc">{{ card.description }}</p>
      </div>
      <div class="card-footer">
        <a href="{{ url_for(card.endpoint) }}" class="btn btn-primary btn-sm rounded-pill px-3 stretched-link">
          进入功能
        </a>
        <div class="status-pill active">
          <div class="grade-color-chip bg-success rounded-circle" style="width: 6px; height: 6px; border: none;"></div>
          <span>运行中</span>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const featureCards = document.querySelectorAll('.feature-card');
    featureCards.forEach(card => {
      const delay = card.getAttribute('data-delay');
      if (delay) card.style.animationDelay = delay + 's';
    });
  });
</script>
{% endblock %}
